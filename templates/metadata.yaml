# 实验元数据模板
# 由 alloscale.py new 自动填充

id: "{id}"
created: "{created}"
updated: "{updated}"
purpose: "{purpose}"
tags: {tags}
status: "{status}"

config:                   # 实验配置（自由填写）
  custom: {{}}

provenance:               # 代码溯源
  code_repo: ""
  code_version: "{code_version}"
  code_branch: ""
  notes: ""

data: {{}}                  # 数据注册表（逻辑名 → 文件）

figures: {{}}               # 数据→脚本→图表的溯源链
